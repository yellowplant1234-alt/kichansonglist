<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기찬아 노래책🎶</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1100px; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { margin: 0; color: #fff; font-size: 28px; }
        .search-area { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; }
        .search-box input { width: calc(100% - 24px); padding: 12px; border: 1px solid #333; border-radius: 8px; background: #2a2a2a; color: #fff; font-size: 16px; }
        .filter-box { display: flex; gap: 12px; background: #252525; padding: 10px 15px; border-radius: 8px; border: 1px solid #333; }
        .genre-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 20px; background: #2a2a2a; color: #bbb; cursor: pointer; }
        .tab-btn.active, .tab-btn:hover { background: #4caf50; color: #fff; }
        .song-table { width: 100%; border-collapse: collapse; }
        .song-table th, .song-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; vertical-align: middle; }
        .song-table th { background-color: #252525; color: #fff; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
        .chk-label { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: #aaa; margin-right: 10px; user-select: none; }
        .chk-label input { width: 15px; height: 15px; accent-color: #4caf50; }
        .chk-label.active { color: #66bb6a; font-weight: bold; }
        .chk-label.active-blue { color: #29b6f6; font-weight: bold; }
        .status-msg { text-align: center; padding: 20px; color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>기찬아 노래책🎶</h1>
        <span style="font-size: 13px; color: #888;">📊 구글 시트 실시간 연동 중</span>
    </div>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="제목, 가수, 작품명 등을 검색하세요..." oninput="filterSongs()">
        </div>
        <div class="filter-box">
            <label class="chk-label" style="color: #66bb6a;"><input type="checkbox" id="filterTicket" onchange="filterSongs()"> 🎫 노래권 필요</label>
            <label class="chk-label" style="color: #29b6f6;"><input type="checkbox" id="filterFull" onchange="filterSongs()"> 🎬 풀버전 가능</label>
        </div>
    </div>

    <div class="genre-tabs" id="genreTabs">
        <button class="tab-btn active" onclick="selectGenre('전체')">전체</button>
    </div>

    <table class="song-table">
        <thead>
            <tr>
                <th>장르</th>
                <th>제목</th>
                <th>가수</th>
                <th>작품명</th>
                <th>옵션</th>
                <th>부른 날짜</th>
            </tr>
        </thead>
        <tbody id="songList">
            <tr>
                <td colspan="6" class="status-msg">🎵 노래 목록을 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 보내주신 구글 스프레드시트 CSV 주소 연결
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRY8YUDFCMJyNq3Ezy0eiI_vhwDVn4dWGC22fv7nKkbnQUwc-bLJ1QvdhZF-RwYgNqJXO4IESweU5P_/pub?gid=0&single=true&output=csv";
    
    let songData = [];
    let currentGenre = "전체";

    // 구글 시트에서 데이터 받아오기
    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            parseCSV(data);
            renderTabs();
            filterSongs();
        } catch (error) {
            console.error("데이터 로드 실패:", error);
            document.getElementById("songList").innerHTML = '<tr><td colspan="6" class="status-msg" style="color:#f44336;">❌ 데이터를 불러오지 못했습니다. 스프레드시트 웹 게시 설정을 확인해 주세요.</td></tr>';
        }
    }

    // CSV 데이터 파싱 (쉼표 및 따옴표 예외처리 포함)
    function parseCSV(text) {
        const lines = text.split("\n");
        const result = [];
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            // CSV 행 분리 규칙
            const cols = [];
            let match;
            const lexer = /"([^"\\]*(?:\\.[^"\\]*)*)"|([^,]+)|(?<=,)(?=,)|^(?=,)|(?<=,)$/g;
            while ((match = lexer.exec(line)) !== null) {
                cols.push(match[1] || match[2] || "");
            }
            
            if (cols.length >= 2) {
                const genre = cols[0] ? cols[0].trim() : "기타";
                const title = cols[1] ? cols[1].trim() : "";
                const artist = cols[2] ? cols[2].trim() : "-";
                const work = cols[3] ? cols[3].trim() : "-";
                const memo = cols[4] ? cols[4].trim() : "";
                const date = cols[5] ? cols[5].trim() : "-";

                // 첫 줄 제목 열(헤더) 제외 처리
                if (title === "제목" || title === "") continue;

                const needTicket = memo.includes("노래권");
                // 메모가 완전히 비어있거나, 대시(-)거나, '풀버전' 글씨가 있으면 풀버전 가능 체크
                const fullVersion = (memo === "" || memo === "-" || memo.includes("풀버전"));

                result.push({ genre, title, artist, work, needTicket, fullVersion, date });
            }
        }
        songData = result;
    }

    function getGenreColor(genre) {
        if (genre === "전체" || !genre) return "#555555";
        let hash = 0;
        for (let i = 0; i < genre.length; i++) hash = genre.charCodeAt(i) + ((hash << 5) - hash);
        const colors = ["#e57373", "#f06292", "#ba68c8", "#4db6ac", "#7986cb", "#64b5f6", "#ffb74d", "#a1887f"];
        return colors[Math.abs(hash) % colors.length];
    }

    function renderTabs() {
        const container = document.getElementById("genreTabs");
        if (!container) return;
        
        const uniqueGenres = [];
        songData.forEach(s => {
            if (s.genre && !uniqueGenres.includes(s.genre)) uniqueGenres.push(s.genre);
        });
        
        const genres = ["전체", ...uniqueGenres];
        container.innerHTML = genres.map(g => 
            `<button class="tab-btn ${g === currentGenre ? 'active' : ''}" onclick="selectGenre('${g}')">${g}</button>`
        ).join('');
    }

    function selectGenre(g) { currentGenre = g; renderTabs(); filterSongs(); }

    function filterSongs() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const tbody = document.getElementById("songList");
        if (!tbody) return;
        
        const fTicket = document.getElementById("filterTicket").checked;
        const fFull = document.getElementById("filterFull").checked;
        
        let filtered = songData.filter(song => {
            const mGenre = (currentGenre === "전체" || song.genre === currentGenre);
            const mQuery = song.title.toLowerCase().includes(query) || 
                           song.artist.toLowerCase().includes(query) || 
                           song.work.toLowerCase().includes(query);
            return mGenre && mQuery && (!fTicket || song.needTicket) && (!fFull || song.fullVersion);
        });
        
        // 가나다순 정렬
        filtered.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="status-msg">결과가 없습니다. 🥲</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(s => `
            <tr>
                <td><span class="tag" style="background-color: ${getGenreColor(s.genre)};">${s.genre}</span></td>
                <td style="font-weight:bold; color:#fff;">${s.title}</td>
                <td>${s.artist}</td>
                <td><span style="color: #aaa; font-size: 14px;">${s.work}</span></td>
                <td>
                    <label class="chk-label ${s.needTicket ? 'active' : ''}"><input type="checkbox" ${s.needTicket ? 'checked' : ''} disabled> 노래권 필요</label>
                    <label class="chk-label ${s.fullVersion ? 'active-blue' : ''}"><input type="checkbox" ${s.fullVersion ? 'checked' : ''} disabled> 풀버전 가능</label>
                </td>
                <td><span style="color: #66bb6a; font-size: 14px;">${s.date}</span></td>
            </tr>
        `).join('');
    }

    window.onload = fetchSheetData;
</script>
</body>
</html>
